- name: Deploy Spring Boot app
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # GitHub Actions checks out repo here; safest in CI
    repo_root: "{{ lookup('env', 'GITHUB_WORKSPACE') }}"
    image_uri: "{{ lookup('env', 'IMAGE_URI') }}"
    deployment_file: "{{ repo_root }}/k8s/deployment.yaml"
    service_file: "{{ repo_root }}/k8s/service.yaml"

  tasks:
    - name: Debug resolved paths
      ansible.builtin.debug:
        msg:
          - "repo_root={{ repo_root }}"
          - "deployment_file={{ deployment_file }}"
          - "service_file={{ service_file }}"

    - name: Validate manifest files exist
      ansible.builtin.stat:
        path: "{{ deployment_file }}"
      register: deploy_stat

    - name: Fail if deployment manifest is missing
      ansible.builtin.fail:
        msg: "Deployment manifest not found at {{ deployment_file }}. Check working directory and checkout."
      when: not deploy_stat.stat.exists

      
    - name: Check service manifest exists
      ansible.builtin.stat:
        path: "{{ service_file }}"
      register: svc_stat

    - name: Fail if service manifest is missing
      ansible.builtin.fail:
        msg: "Service manifest not found at {{ service_file }}"
      when: not svc_stat.stat.exists


    - name: Replace image placeholder
      ansible.builtin.replace:
        path: "{{ deployment_file }}"
        regexp: "REPLACE_IMAGE"
        replace: "{{ image_uri }}"

    - name: Apply manifests
      ansible.builtin.command: kubectl apply -f "{{ deployment_file }}"

    - name: Apply service
      ansible.builtin.command: kubectl apply -f "{{ service_file }}"

    - name: Show deployment status
      ansible.builtin.command: kubectl get deploy spring-eks-demo -o wide
      register: deploy_out
      changed_when: false
    
    - name: Print deployment status
      ansible.builtin.debug:
        var: deploy_out.stdout
    
    - name: Show pods
      ansible.builtin.command: kubectl get pods -l app=spring-eks-demo -o wide
      register: pods_out
      changed_when: false
    
    - name: Print pods
      ansible.builtin.debug:
        var: pods_out.stdout
    
    - name: Describe deployment (events included)
      ansible.builtin.command: kubectl describe deploy spring-eks-demo
      register: desc_out
      changed_when: false
    
    - name: Print describe output
      ansible.builtin.debug:
        var: desc_out.stdout
        
    - name: Rollout check with diagnostics on failure
      block:
        - name: Wait for rollout (with timeout)
          ansible.builtin.command: kubectl rollout status deploy/spring-eks-demo --timeout=180s
        
      rescue:
        - name: Get events (last 50)
          ansible.builtin.command: kubectl get events --sort-by=.metadata.creationTimestamp | tail -n 50
          register: ev
          changed_when: false
        - ansible.builtin.debug:
            var: ev.stdout
    
        - name: Describe pods
          ansible.builtin.command: kubectl describe pods -l app=spring-eks-demo
          register: pod_desc
          changed_when: false
        - ansible.builtin.debug:
            var: pod_desc.stdout
    
        - name: Pod logs (if any)
          ansible.builtin.command: kubectl logs -l app=spring-eks-demo --tail=200 --all-containers=true
          register: logs
          changed_when: false
        - ansible.builtin.debug:
            var: logs.stdout
    
        - name: Fail after diagnostics
          ansible.builtin.fail:
            msg: "Rollout failed. See diagnostics above."

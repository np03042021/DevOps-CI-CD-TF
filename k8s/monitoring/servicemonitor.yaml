apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: springboot-app
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: springboot-app
  namespaceSelector:
    matchNames:
      - default   # or your app namespace
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
